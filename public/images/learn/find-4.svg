<svg width="480" height="260" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="480" height="260" fill="#f0fdf4"/>
  <text x="240" y="28" text-anchor="middle" font-size="14" fill="#64748b">To find x, subtract 3 from both sides</text>
  <!-- Step 1 -->
  <rect x="20" y="46" width="200" height="80" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  <text x="120" y="72" text-anchor="middle" font-size="13" fill="#94a3b8">start with:</text>
  <text x="120" y="112" text-anchor="middle" font-size="30" font-weight="bold" fill="#475569">3 + x = 7</text>
  <!-- Arrow down -->
  <defs>
    <marker id="a4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <path d="M 120 134 L 120 154" stroke="#94a3b8" stroke-width="2" marker-end="url(#a4)"/>
  <text x="150" y="148" font-size="12" fill="#64748b">subtract 3</text>
  <!-- Step 2 -->
  <rect x="20" y="160" width="200" height="68" rx="12" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="120" y="183" text-anchor="middle" font-size="13" fill="#15803d">so:</text>
  <text x="120" y="216" text-anchor="middle" font-size="30" font-weight="bold" fill="#166534">x = 7 − 3</text>
  <!-- Right side: answer -->
  <rect x="268" y="80" width="188" height="100" rx="16" fill="#059669"/>
  <text x="362" y="122" text-anchor="middle" font-size="20" fill="white">x =</text>
  <text x="362" y="162" text-anchor="middle" font-size="52" font-weight="bold" fill="white">4</text>
  <!-- Bottom -->
  <text x="240" y="252" text-anchor="middle" font-size="14" font-weight="600" fill="#059669">x = 7 − 3 = 4</text>
</svg>
