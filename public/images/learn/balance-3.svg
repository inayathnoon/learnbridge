<svg width="480" height="260" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="480" height="260" fill="#eff6ff"/>
  <text x="240" y="26" text-anchor="middle" font-size="14" fill="#64748b">x + 5 = 12 — let's find x</text>
  <!-- Step 1: original equation on scale -->
  <rect x="20" y="44" width="200" height="80" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  <text x="120" y="68" text-anchor="middle" font-size="13" fill="#64748b">equation:</text>
  <text x="120" y="108" text-anchor="middle" font-size="30" font-weight="bold" fill="#1d4ed8">x + 5 = 12</text>
  <!-- Arrow -->
  <defs>
    <marker id="a6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <path d="M 228 84 L 258 84" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#a6)"/>
  <text x="243" y="74" text-anchor="middle" font-size="10" fill="#64748b">subtract 5</text>
  <text x="243" y="98" text-anchor="middle" font-size="10" fill="#64748b">both sides</text>
  <!-- Step 2: result -->
  <rect x="262" y="44" width="196" height="80" rx="12" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="360" y="68" text-anchor="middle" font-size="13" fill="#15803d">solution:</text>
  <text x="360" y="108" text-anchor="middle" font-size="30" font-weight="bold" fill="#166534">x = 12 − 5</text>
  <!-- Answer box -->
  <rect x="140" y="148" width="200" height="60" rx="14" fill="#059669"/>
  <text x="240" y="188" text-anchor="middle" font-size="36" font-weight="bold" fill="white">x = 7</text>
  <!-- Bottom check -->
  <text x="240" y="238" text-anchor="middle" font-size="14" fill="#475569">Check: 7 + 5 = 12 ✓</text>
</svg>
