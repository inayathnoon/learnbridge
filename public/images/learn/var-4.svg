<svg width="480" height="260" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="480" height="260" fill="#f0fdf4"/>
  <text x="240" y="26" text-anchor="middle" font-size="14" fill="#64748b">When we know the value of n, we can solve</text>
  <!-- Left panel: n = 5 -->
  <rect x="24" y="44" width="188" height="120" rx="14" fill="white" stroke="#bbf7d0" stroke-width="2"/>
  <text x="118" y="78" text-anchor="middle" font-size="13" fill="#64748b">We know:</text>
  <text x="118" y="130" text-anchor="middle" font-size="42" font-weight="bold" fill="#059669">n = 5</text>
  <!-- Arrow -->
  <defs>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <path d="M 220 104 L 254 104" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#a2)"/>
  <!-- Right panel: solution -->
  <rect x="258" y="44" width="198" height="120" rx="14" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="357" y="78" text-anchor="middle" font-size="13" fill="#64748b">Replace n with 5:</text>
  <text x="357" y="110" text-anchor="middle" font-size="22" fill="#166534">n + 2 = ?</text>
  <text x="357" y="140" text-anchor="middle" font-size="26" font-weight="bold" fill="#15803d">5 + 2 = 7 ✓</text>
  <!-- Bottom -->
  <text x="240" y="196" text-anchor="middle" font-size="14" fill="#475569">Plug the value in wherever you see the variable</text>
  <text x="240" y="226" text-anchor="middle" font-size="20" font-weight="bold" fill="#059669">n + 2  →  5 + 2  =  7</text>
</svg>
