<svg width="480" height="260" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="480" height="260" fill="#fdf4ff"/>
  <text x="240" y="26" text-anchor="middle" font-size="14" fill="#64748b">Priya has 3 times as many stickers as Mia</text>
  <!-- Mia panel -->
  <rect x="20" y="44" width="180" height="140" rx="14" fill="white" stroke="#e9d5ff" stroke-width="2"/>
  <text x="110" y="70" text-anchor="middle" font-size="13" font-weight="600" fill="#7c3aed">Mia</text>
  <!-- 3 stars -->
  <text x="60" y="115" font-size="28">⭐</text><text x="95" y="115" font-size="28">⭐</text><text x="130" y="115" font-size="28">⭐</text>
  <text x="110" y="156" text-anchor="middle" font-size="22" font-weight="bold" fill="#7c3aed">s stickers</text>
  <!-- × 3 -->
  <text x="215" y="122" text-anchor="middle" font-size="32" font-weight="bold" fill="#64748b">×3</text>
  <!-- Priya panel -->
  <rect x="250" y="44" width="210" height="140" rx="14" fill="#f3e8ff" stroke="#c084fc" stroke-width="2"/>
  <text x="355" y="70" text-anchor="middle" font-size="13" font-weight="600" fill="#7c3aed">Priya</text>
  <!-- 9 stars in 3×3 grid -->
  <text x="278" y="102" font-size="22">⭐</text><text x="308" y="102" font-size="22">⭐</text><text x="338" y="102" font-size="22">⭐</text>
  <text x="278" y="128" font-size="22">⭐</text><text x="308" y="128" font-size="22">⭐</text><text x="338" y="128" font-size="22">⭐</text>
  <text x="278" y="154" font-size="22">⭐</text><text x="308" y="154" font-size="22">⭐</text><text x="338" y="154" font-size="22">⭐</text>
  <text x="395" y="128" text-anchor="middle" font-size="22" font-weight="bold" fill="#7c3aed">3s</text>
  <!-- Bottom -->
  <text x="240" y="208" text-anchor="middle" font-size="15" font-weight="600" fill="#7c3aed">Priya's stickers = 3 × s = 3s</text>
  <text x="240" y="234" text-anchor="middle" font-size="13" fill="#64748b">3s means 3 times whatever number s is</text>
</svg>
