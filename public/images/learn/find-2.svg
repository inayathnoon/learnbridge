<svg width="480" height="260" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="480" height="260" fill="#eff6ff"/>
  <text x="240" y="30" text-anchor="middle" font-size="15" fill="#64748b">We write it as a maths statement</text>
  <!-- Big equation -->
  <text x="120" y="148" text-anchor="middle" font-size="60" font-weight="bold" fill="#475569">3 +</text>
  <!-- ? box highlighted -->
  <rect x="232" y="88" width="84" height="76" rx="12" fill="#fde68a" stroke="#f59e0b" stroke-width="3"/>
  <text x="274" y="148" text-anchor="middle" font-size="60" font-weight="bold" fill="#b45309">?</text>
  <text x="390" y="148" text-anchor="middle" font-size="60" font-weight="bold" fill="#475569">= 7</text>
  <!-- Label under ? -->
  <text x="274" y="185" text-anchor="middle" font-size="13" fill="#92400e">← find this</text>
  <!-- Bottom -->
  <text x="240" y="220" text-anchor="middle" font-size="15" fill="#475569">What number plus 3 gives us 7?</text>
  <text x="240" y="248" text-anchor="middle" font-size="13" fill="#94a3b8">In the next step, we'll use a letter instead of ?</text>
</svg>
