<svg width="480" height="260" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="480" height="260" fill="#f0f9ff"/>
  <text x="240" y="28" text-anchor="middle" font-size="14" fill="#64748b">A pattern follows a rule — can you spot it?</text>
  <!-- Group 1: 2 dots -->
  <circle cx="44" cy="95" r="12" fill="#3b82f6"/>
  <circle cx="70" cy="95" r="12" fill="#3b82f6"/>
  <text x="57" y="130" text-anchor="middle" font-size="22" font-weight="bold" fill="#1d4ed8">2</text>
  <!-- Group 2: 4 dots -->
  <circle cx="126" cy="84" r="12" fill="#3b82f6"/><circle cx="152" cy="84" r="12" fill="#3b82f6"/>
  <circle cx="126" cy="110" r="12" fill="#3b82f6"/><circle cx="152" cy="110" r="12" fill="#3b82f6"/>
  <text x="139" y="140" text-anchor="middle" font-size="22" font-weight="bold" fill="#1d4ed8">4</text>
  <!-- Group 3: 6 dots -->
  <circle cx="208" cy="78" r="12" fill="#3b82f6"/><circle cx="234" cy="78" r="12" fill="#3b82f6"/>
  <circle cx="208" cy="104" r="12" fill="#3b82f6"/><circle cx="234" cy="104" r="12" fill="#3b82f6"/>
  <circle cx="208" cy="130" r="12" fill="#3b82f6"/><circle cx="234" cy="130" r="12" fill="#3b82f6"/>
  <text x="221" y="156" text-anchor="middle" font-size="22" font-weight="bold" fill="#1d4ed8">6</text>
  <!-- Group 4: 8 dots -->
  <circle cx="292" cy="72" r="12" fill="#3b82f6"/><circle cx="318" cy="72" r="12" fill="#3b82f6"/>
  <circle cx="292" cy="98" r="12" fill="#3b82f6"/><circle cx="318" cy="98" r="12" fill="#3b82f6"/>
  <circle cx="292" cy="124" r="12" fill="#3b82f6"/><circle cx="318" cy="124" r="12" fill="#3b82f6"/>
  <circle cx="292" cy="150" r="12" fill="#3b82f6"/><circle cx="318" cy="150" r="12" fill="#3b82f6"/>
  <text x="305" y="176" text-anchor="middle" font-size="22" font-weight="bold" fill="#1d4ed8">8</text>
  <!-- Question group -->
  <rect x="370" y="66" width="80" height="116" rx="12" fill="#fde68a" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="410" y="136" text-anchor="middle" font-size="40" font-weight="bold" fill="#b45309">?</text>
  <text x="410" y="196" text-anchor="middle" font-size="22" font-weight="bold" fill="#d97706">?</text>
  <!-- Bottom -->
  <text x="240" y="230" text-anchor="middle" font-size="15" font-weight="600" fill="#1d4ed8">2, 4, 6, 8, ...</text>
  <text x="240" y="252" text-anchor="middle" font-size="13" fill="#64748b">What is the rule? What comes next?</text>
</svg>
