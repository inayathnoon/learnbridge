<svg width="480" height="260" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="480" height="260" fill="#f0fdf4"/>
  <text x="240" y="28" text-anchor="middle" font-size="14" fill="#64748b">Always check your answer!</text>
  <!-- Big check equation -->
  <rect x="60" y="50" width="360" height="100" rx="18" fill="#dcfce7" stroke="#86efac" stroke-width="2.5"/>
  <text x="240" y="90" text-anchor="middle" font-size="18" fill="#15803d">put x = 4 back in:</text>
  <text x="240" y="134" text-anchor="middle" font-size="38" font-weight="bold" fill="#166534">3 + 4 = 7  ✓</text>
  <!-- Celebration -->
  <text x="100" y="195" text-anchor="middle" font-size="36">🎉</text>
  <text x="380" y="195" text-anchor="middle" font-size="36">🎉</text>
  <text x="240" y="198" text-anchor="middle" font-size="16" font-weight="600" fill="#059669">You just solved an equation!</text>
  <text x="240" y="232" text-anchor="middle" font-size="14" fill="#475569">Finding the unknown = the heart of algebra</text>
</svg>
