<svg width="480" height="260" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="480" height="260" fill="#fef9f0"/>
  <text x="240" y="24" text-anchor="middle" font-size="14" fill="#64748b">Add the same to both sides to stay balanced</text>
  <!-- Left scene: tipped (unbalanced) -->
  <text x="105" y="50" text-anchor="middle" font-size="12" fill="#ef4444">❌ unbalanced</text>
  <rect x="58" y="130" width="100" height="10" rx="3" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="60" y="96" width="44" height="28" rx="6" fill="#3b82f6"/>
  <text x="82" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="white">x+3</text>
  <rect x="112" y="110" width="44" height="28" rx="6" fill="#ef4444"/>
  <text x="134" y="129" text-anchor="middle" font-size="13" font-weight="bold" fill="white">7</text>
  <rect x="96" y="140" width="12" height="50" rx="3" fill="#b45309"/>
  <!-- Arrow -->
  <defs>
    <marker id="a5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <path d="M 188 130 L 218 130" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#a5)"/>
  <text x="203" y="120" text-anchor="middle" font-size="10" fill="#64748b">add 3</text>
  <text x="203" y="148" text-anchor="middle" font-size="10" fill="#64748b">both sides</text>
  <!-- Right scene: balanced -->
  <text x="355" y="50" text-anchor="middle" font-size="12" fill="#10b981">✓ balanced</text>
  <rect x="300" y="120" width="110" height="10" rx="3" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="302" y="86" width="46" height="28" rx="6" fill="#3b82f6"/>
  <text x="325" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="white">x+6</text>
  <rect x="362" y="86" width="46" height="28" rx="6" fill="#10b981"/>
  <text x="385" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="white">10</text>
  <rect x="349" y="130" width="12" height="50" rx="3" fill="#b45309"/>
  <!-- Bottom -->
  <text x="240" y="210" text-anchor="middle" font-size="14" font-weight="600" fill="#d97706">Add 3 to left  →  must add 3 to right too</text>
  <text x="240" y="238" text-anchor="middle" font-size="13" fill="#64748b">This keeps the equation true</text>
</svg>
