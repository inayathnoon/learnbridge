<svg width="480" height="260" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="480" height="260" fill="#f0fdf4"/>
  <text x="240" y="26" text-anchor="middle" font-size="14" fill="#64748b">If you have pencils in a box but don't know how many...</text>
  <!-- Box -->
  <rect x="130" y="48" width="220" height="130" rx="12" fill="white" stroke="#86efac" stroke-width="2.5"/>
  <!-- Pencils -->
  <rect x="158" y="68" width="16" height="88" rx="3" fill="#fbbf24"/><polygon points="158,68 174,68 166,52" fill="#f59e0b"/><rect x="158" y="153" width="16" height="6" rx="1" fill="#ef4444"/>
  <rect x="184" y="68" width="16" height="88" rx="3" fill="#34d399"/><polygon points="184,68 200,68 192,52" fill="#10b981"/><rect x="184" y="153" width="16" height="6" rx="1" fill="#ef4444"/>
  <rect x="210" y="68" width="16" height="88" rx="3" fill="#60a5fa"/><polygon points="210,68 226,68 218,52" fill="#3b82f6"/><rect x="210" y="153" width="16" height="6" rx="1" fill="#ef4444"/>
  <rect x="236" y="68" width="16" height="88" rx="3" fill="#f472b6"/><polygon points="236,68 252,68 244,52" fill="#ec4899"/><rect x="236" y="153" width="16" height="6" rx="1" fill="#ef4444"/>
  <rect x="262" y="68" width="16" height="88" rx="3" fill="#a78bfa"/><polygon points="262,68 278,68 270,52" fill="#8b5cf6"/><rect x="262" y="153" width="16" height="6" rx="1" fill="#ef4444"/>
  <rect x="288" y="68" width="16" height="88" rx="3" fill="#fb923c"/><polygon points="288,68 304,68 296,52" fill="#ea580c"/><rect x="288" y="153" width="16" height="6" rx="1" fill="#ef4444"/>
  <!-- n brace on left -->
  <path d="M 126 80 Q 100 80 100 113 Q 100 146 126 146" fill="none" stroke="#10b981" stroke-width="2.5"/>
  <text x="82" y="120" text-anchor="middle" font-size="30" font-weight="bold" fill="#059669">n</text>
  <!-- Label -->
  <text x="240" y="202" text-anchor="middle" font-size="15" font-weight="600" fill="#047857">n = number of pencils in the box</text>
  <text x="240" y="228" text-anchor="middle" font-size="13" fill="#64748b">n is our variable — it could be 3, 5, 10…</text>
</svg>
